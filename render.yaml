# Render Blueprint — https://render.com/docs/blueprint-spec
# A single free static site. Render auto-deploys on every push to `main`
# once this repo is connected via the Render dashboard (New → Blueprint).
services:
  - type: web
    name: bank-csv-ynab
    runtime: static
    # `npm ci` installs exactly what's in package-lock.json (reproducible,
    # lockfile-faithful) rather than re-resolving version ranges.
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # Auto-deploy on push to the connected branch.
    autoDeploy: true
    # SPA fallback: serve index.html for any path so client-side routing /
    # deep links never 404.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Content-Security-Policy is the key control: scripts may only load from
      # this origin and the page may only connect (fetch/XHR/WS) to YNAB. Even
      # if a dependency were compromised, it could not exfiltrate the token to
      # an attacker's server.
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src https://api.ynab.com; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests"
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Strict-Transport-Security
        value: "max-age=31536000"
      - path: /*
        name: Permissions-Policy
        value: "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=(), interest-cohort=()"
