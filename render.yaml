# Render Blueprint — https://render.com/docs/blueprint-spec
# A single free static site. Render auto-deploys on every push to `main`
# once this repo is connected via the Render dashboard (New → Blueprint).
services:
  - type: web
    name: bank-csv-ynab
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Auto-deploy on push to the connected branch.
    autoDeploy: true
    # SPA fallback: serve index.html for any path so client-side routing /
    # deep links never 404.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
